<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <title>TO DO LIST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <select id="theme-select">
        <option value="default">Light theme</option>
        <option value="dark">Dark theme</option>
        <option value="colored">Colorful theme</option>
    </select>
    <main >
        <section class="main-section">
            <h1>What's next? </h1>
            <div class="input-bar">
                <input id="new-task-input" aria-label="new-task-input" type="text" placeholder="Start typing..." autocomplete="off">
                <button id="add-btn" type="button"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div id="filters">
                <div class="filters">
                    <span class="filter" id="show-all-tasks">All</span> |
                    <span class="filter" id="task-status-active">Active </span>|
                    <span class="filter" id="completed">Completed</span>
                </div>
                <span id="remaining-tasks" aria-label="remaining active tasks"></span>
            </div>
            <ul id="task-list"></ul>
            <img class="empty-image" src="./no-task.png" alt="empty list image">
            <div class="clear-btn-container">
                <span id="clear-completed">Clear completed</span>
            </div>
            <div>
                <span class="clear-btn-container" id="clear-all">Clear all</span>
            </div>
            
        </section>
        <script src="./index.js"></script>
        <script
        src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@4.0.5/tsparticles.confetti.bundle.min.js"></script>
    </main>
</body>
</html>
